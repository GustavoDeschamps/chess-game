<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Coach</title>
    <meta name="description" content="Play chess against a bot and get coached on every move." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    />
    <!-- GitHub Pages SPA routing: restore path that was redirected via 404.html -->
    <script>
      (function () {
        var redirect = new URLSearchParams(window.location.search).get("p");
        if (redirect) {
          var base = "/chess-game";
          window.history.replaceState(null, "", base + redirect + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
