<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chess Coach</title>
    <script>
      // Redirect any deep-link 404 back to index.html with the original path
      // encoded as ?p=... so the SPA router can restore it.
      (function () {
        var base = "/chess-game";
        var path = window.location.pathname;
        if (path.indexOf(base) === 0) path = path.slice(base.length);
        var search = window.location.search;
        var hash = window.location.hash;
        window.location.replace(
          base + "/?p=" + encodeURIComponent(path) + (search ? "&" + search.slice(1) : "") + hash,
        );
      })();
    </script>
  </head>
  <body></body>
</html>
